Our settlement in the new land starts to adopt local plants and herds. If we import these stuff back into our continent. We could gain a lot more profits. = Наше поселение на новой земле начинает перенимать местные растения и разводить местные стада. Если мы будем импортировать эти продукты обратно на наш континент, мы сможем получить гораздо больше прибыли.
We should focus on the new staple crops. = Нам следует сосредоточиться на новых основных сельскохозяйственных культурах.
We should focus on the new economic crops. = Нам следует сосредоточиться на новых экономических культурах.
These exotic new animals are quite beautiful. = Эти экзотические новые животные довольно красивы.
We should respect the locals and exchange more [culture] = Нам следует уважать местных жителей и больше обмениваться культурой
Great Exchange = Отличный обмен

The [Caste System] is getting harder to maintain by the days. It restricts the upward mobility in our civilization way too much. = Кастовую систему с каждым днем становится все труднее поддерживать. Она слишком сильно ограничивает социальную мобильность в нашей цивилизации.
We shall abandon the destinied inequality. = Мы откажемся от предопределенного неравенства.
