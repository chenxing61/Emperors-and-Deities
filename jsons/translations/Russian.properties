We should exchange our knowledges amongst our tribes = Мы должны обмениваться знаниями между нашими племенами
Elect a new Khan! = Изберите нового хана!
Make use of our unified power = Используйте нашу объединенную мощь
[+50%] Production when constructing all buildings  = [+50%] Производство при строительстве всех зданий
Study the advanced culture of the other civilizations = Изучите развитую культуру других цивилизаций
Tribe Assembly = Собрание племени

As Enough [Settlement Process] has been gained. We may now futher develop our lands. = Поскольку [Settlement Process] достигнул достаточного уровня теперь мы можем продолжить развитие наших земель.
Now we have stability in hand. = Теперь у нас есть стабильность.
Settle Down = Успокоиться

A talented young prince called Alexander decides that his dream to be the conqueror of the world... = Талантливый молодой принц по имени Александр решает, что его мечта стать покорителем мира...
