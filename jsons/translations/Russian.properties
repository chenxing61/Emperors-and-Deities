Xiang Yu the dominator = Сян Юй, повелитель
Collapse of the Great Qin = Крах Великого Цинь

 # Requires translation!
Europa has a variety of cultures scattered around. Certain culture's futher developments can improve our Civilisation's performance greatly. = 
Gauls = Галлы
Albions = Альбионы
Goths = Готы
Saxons = Саксы
Slavs = Славяне
You need at least 5 [Influence] and 200 [Gold] to adopt a culture. = Для принятия культуры вам потребуется как минимум 5 [Влияния] и 200 [Золота].
The Tribes of Europe = Племена Европы

As the egyptian dynasty countinues to be... a new power in the same region grows... = Пока египетская династия продолжает существовать... в том же регионе растет новая сила...
New culture, new blood... = Новая культура, новая кровь...
Who dares to defy the pharoh? = Кто осмелится бросить вызов фараону?
Rise of the Punics = Расцвет Пуннов

A group of nomadic outsider has migrated and conquered their way into our land... With new ideals and army traditions. = Группа кочевых пришельцев мигрировала и завоевала нашу землю… С новыми идеалами и армейскими традициями.
So begins the Indo-Aryan's leadership in South Asia. = Так начинается правление индоарийцев в Южной Аз
The Harappans had successfully repelled the invasion. = Хараппцы успешно отразили вторжение.
Aryan Migration = Арийская миграция

A wealthy prince named Siddhartha Gautama has became a great philosopher of sort and started a religious movement following his own ideal... = Богатый принц по имени Сиддхартха Гаутама стал своего рода великим философом и основал религиозное движение, следуя своему собственному идеалу...
Maybe... We all need a bit of forgiveness in our life. = Возможно... Нам всем нужно немного прощения в жизни.
Stops [Maurya Empire] from automatically adopting [Meritocracy]. = Останавливает [Maurya Empire] от автоматического принятия [Meritocracy].
Heretical Teaching. = Еретическое учение.
Buddha's birth = Рождение Будды

As a new era arrives, a new culture emerges from the steppes. = С наступлением новой эры из степей возникает новая культура.
The Scythians Emerges = Появление скифов
The Huns Emerges = Появление гуннов
The Xiong Nu Emerges = Появление сюнну
Not yet... = Пока нет...
Emergence of Nations = Возникновение наций

Well every story has an end. The Great Commander finally steps down from his position in the army. But how does it play out is a story of its own. = Что ж, у каждой истории есть конец. Великий полководец наконец покидает свой пост в армии. Но как это произойдет - это отдельная история.
Honorable Retirement = Почетная отставка
The Great Commander has inspired countless people. His retirement is well deserved. He will be idolised. = Великий полководец вдохновил бесчисленное множество людей. Его отставка заслуженна. Его будут боготворить.
Backstabbed = Удар в спину
Lets just say that there are no perfect man. It would seems like power struggle and other caused this General to step down. Maybe he was too greedy? Too proud of himself? The history can't give a clear answer. = Скажем так, идеальных людей не бывает. Похоже, борьба за власть и другие причины заставили этого генерала уйти в отставку. Может быть, он был слишком жаден? Слишком горд собой? История не может дать четкого ответа.
Great Commander's Retirement = Уход великого полководца на пенсию

Many different theories has developed around how to manage our civilization's wealth and productions. As the wind of commerce starts to flow. = Разработалось множество различных теорий о том, как управлять богатством и производством нашей цивилизации. По мере того, как начинает дуть ветер торговли.
If the market is free, then its a good deed = Если рынок свободен, то это доброе дело
Profiteers would ruin the country. = Спекулянты разорят страну.
Economic Theories = Экономические теории

The Traditional Feudal System crumbles before the new rising bourgeoisie class as industrial revolution continues. Subsequently, bourgeoisies and proletariats revolted against the traditional system, how does the revolution happen? = Традиционная феодальная система рушится под натиском нового восходящего класса буржуазии на фоне продолжающейся промышленной революции. Впоследствии буржуазия и пролетариат восстали против традиционной системы. Как произойдет революция?
The Revolution has failed. = Революция провалилась.
The revolution is dead. The government of nobilities continue their ruling,'Noble Army' strength are increased by a third permanently. = Революция мертва. Правительство знати продолжает править, что имеет долгосрочные негативные последствия для любых попыток реформ и краткосрочные негативные эффекты для экономики. Но сила 'Армии знати' навсегда увеличена на треть.
Peaceful Transition. = Мирный переход.
Long term societal divide hinders futher policy and economic development. But the revolution have its main goal achieved = Долгосрочный общественный раскол препятствует дальнейшему политическому и экономическому развитию. Но главная цель революции достигнута.
Both negotiations and conflicts are happening... = Идут и переговоры, и конфликты...
The revolution...is chaotic. Some cities have peacefully transitioned their power to the new ruling class, while some starts to infight violently. Our civilization has entered a state of [Struggle]. All [Revolutionaries] gain some basic promotions and the 'Standing Army' gains 5% strength bonus permanently. = Революция... носит хаотичный характер. Некоторые города мирно передали власть новому правящему классу, в то время как в других начинается ожесточенная междоусобная борьба. Наша цивилизация вступила в состояние [Struggle]. Все [Revolutionaries] получают некоторые базовые повышения, а «Постоянная армия» получает постоянный бонус к силе в размере 5%.
Clean the parasites! = Очистим от паразитов!
The revolution violently shaked the basis of our society, but our society is able to leap toward progressiveness! the civilization enters a state of [Strife], but the will of the revolution is well preserved and people are more accepting to societal changes. All Revolutionaries gain many promotions and the 'Standing Army' gains 10% strength bonus permanently. = Революция жестоко потрясла основы нашего общества, но наше общество способно сделать скачок к прогрессу! Повстанцы будут появляться в течение 24 ходов, и экономика будет страдать некоторое время, но воля революции сохранена, и люди более восприимчивы к общественным изменениям. Все Революционеры получают множество повышений, а 'Постоянная армия' навсегда получает +10% к силе.
Bourgeoisie Revolution! = Буржуазная революция!

Through out the history of our grand civilization, what aspect should guide us to the future? = Какой аспект нашей великой цивилизации должен вести нас в будущее на протяжении всей ее истории?
We have no history! = У нас нет истории!
How does one get conservative with no tradition to begin with? = Как стать консерватором, не имея традиций?
We have no history? = У нас нет истории?
We have no history... = У нас нет истории...
The Gods = Боги
The polytheistic root of our faith leads us to splendor, we are the most blessed out of all civilization in the world. = Политеистические корни нашей веры ведут нас к великолепию, мы - самая благословенная из всех цивилизаций мира.
Our Lord = Наш Господь
The monotheistic root of our faith leads us to connect with the truth, the faith is our sword and our plow. = Монотеистические корни нашей веры ведут нас к истине, вера - наш меч и наш плуг.
Our will to unite = Наша воля к единству
The power of unity has guided us through most of our history, without it, where would we be? = Сила единства вела нас большую часть нашей истории, без нее где бы мы были?
Our wisdom = Наша мудрость
Our civilization were once master of philosophy. They lived with great wisdom and we shall never give it up. = Наша цивилизация когда-то была мастером философии. Они жили с великой мудростью, и мы никогда не откажемся от нее.
Our honor = Наша честь
Our civilization were once the most honored warriors. They died with honor and we shall never give it up. = Наша цивилизация когда-то имела самых чтимых воинов. Они погибли с честью, и мы никогда не откажемся от нее.
Our wealth = Наше богатство
Our civilization were once the smartest traders. They left us with all the capital and insights so that we may stay flourished = Наша цивилизация когда-то имела самых умных торговцев. Они оставили нам весь капитал и знания, чтобы мы могли процветать.
Our noble bloodline = Наша благородная кровь
Our ruiling class has the purest blood with virtues passing down from father to son, we will stay true to the noble blood. = Наш правящий класс имеет чистейшую кровь, добродетели передаются от отца к сыну, мы останемся верны благородной крови.
Our efficient bureaucracy = Наша эффективная бюрократия
The fair and great system our ancestor has passed onto us is a testament to our longevity. = Справедливая и великая система, переданная нам предками, - свидетельство нашего долголетия.
Our divinity = Наша божественность
Our civilization has engraved our faith into everything, we are reaching for ultimate goals. = Наша цивилизация вписала нашу веру во все, мы стремимся к высшим целям.
Our humanitarianistic view = Наш гуманизм
We are the pioneer for progressive value to love all human beings. We will spread our care to the world for it to become a better place. = Мы - пионеры прогрессивных ценностей любви ко всем людям. Мы распространим нашу заботу на весь мир, чтобы сделать его лучше.
Our glorious empire = Наша славная империя
Flower and Beauty doesnt keep our splendor. Iron and Blood Does! = Цветы и Красота не сохраняют наше великолепие. Железо и Кровь - да!
The Legacy We Inhereited. = Наследие, которое мы унаследовали.

As the gap between classes widen, the capitalists started to go overboard with their mistreatment of the working class. After struggles in the politics and countless protest, another revolution has unveiled. The Bourgeoisie had it coming... But how did this went down? = По мере роста разрыва между классами капиталисты начали перегибать палку в обращении с рабочим классом. После политической борьбы и бесчисленных протестов разразилась еще одна революция. Буржуазия сама напросилась... Но как все прошло?
Do not let them pass! = Не пропустите их!
The government and all the left wing power has sucessfully stopped Facists from taking over the civilization. = Правительство и вся левая власть успешно остановили фашистов от захвата цивилизации.
For the Leader! = За Вождя!
The Facists and their paramilitary militias took over the most important cities and then gradually took over the entire civilization by storm. = Фашисты и их военизированные формирования захватили важнейшие города, а затем постепенно, штурмом, взяли под свой контроль всю цивилизацию.
Fascist Revolution! = Фашистская революция!

The revolution is dead. The government of capitalists continue their ruling, our civilization enters a state of [Struggle], But the route to Conservatism is unlocked = Революция мертва. Правительство капиталистов продолжает править, что имеет долгосрочные негативные последствия для любых попыток реформ, краткосрочные негативные эффекты для экономики и 8 ходов оставшегося коммунистического восстания. Но путь к Консерватизму открыт.
Socialist Democracy will save the day.. = Социал-демократия спасет положение...
Is this even a revolution when at least half of the bourgeoisie are still up on their place? Who knows. The conflict is resolved peacefully but there are long term consequences toward policy and industry development, [Planned Economy] is not available in this route. = Можно ли вообще назвать это революцией, если по крайней мере половина буржуазии всё ещё на своём месте? Кто знает. Конфликт разрешается мирным путём, но это имеет долгосрочные последствия для политики и развития промышленности, [Planned Economy] недоступна на этом пути.
The Workers have nothing to lose but their chains, they have a world to win. = Рабочим нечего терять, кроме своих цепей, но они приобретут весь мир.
promotions.One revolt, followed by many, the capitalist system died by a thousand cut. And a new nation ruled by workers is built. Our civilization enters [Struggle] due to the civil war. Newly born [Red Army Troop] now have more promotions. = Одно восстание, за ним многие, капиталистическая система умерла от тысячи порезов. И построена новая нация, управляемая рабочими. Производство золота и еды страдает из-за гражданской войны. Гражданская промышленность теперь дает бонусы к культуре, а бонус к производству теперь предоставляется всем городам. Новосозданная красная армия специализируется на тактике. Оставшееся реакционное восстание продолжается 10 ходов.
Workers, Farmers, Soldiers, Students, all shall be united to bring down the capitalists! = Рабочие, крестьяне, солдаты, студенты, все объединятся, чтобы свергнуть капиталистов!
Compare to a worker's revolution, this revolution is a combined effort of all proletariats alike, althought that makes the process of revolution much faster, but the organization of the new country is much more complicated. Our Civilization enters [Strife], New [Red Army Troop] specialises into command promotion. = По сравнению с рабочей революцией, эта революция - совместное усилие всего пролетариата, хотя это значительно ускоряет процесс революции, но организация новой страны намного сложнее. Производство культуры, золота и еды страдает сильнее, но 'Здания образования' и 'Сельскохозяйственные здания' дают бонус к производству, а прирост культуры применяется ко всем городам. Новосозданная красная армия специализируется на командной структуре. Оставшееся реакционное восстание продолжается 10 ходов.
Socialist Revolution! = Социалистическая революция!

The revolution is dead. The government of capitalists continue their ruling, our civilization enters a state of [Struggle], But the route to Conservatism is unlocked. = Революция мертва. Правительство капиталистов продолжает править, что имеет долгосрочные негативные последствия для любых попыток реформ, краткосрочные негативные эффекты для экономики и 8 ходов оставшегося анархистского восстания. Но путь к Консерватизму открыт.
What we proclaim is the Right to Well-Being; Well-Being for All! = То, что мы провозглашаем, - это Право на Благополучие; Благополучие для Всех!
One revolt, followed by many, the capitalist system died by a thousand cut. There are no oppressions anymore. We have eliminated those ticks. Now is the time we enter [Anarchy] and turn it into something else. = Одно восстание, за ним многие, капиталистическая система умерла от тысячи порезов. Больше нет угнетения. Производство культуры, золота, науки, еды страдает из-за гражданской войны и роспуска правительства. Оставшееся реакционное восстание продолжается 15 ходов.
Installs Anarchist Ruling in all of your cities,an alternative ruling style ('Political Building') that replaces the intergration. It is free and built instantly, only providing small amount of debuff and needs Commune to be built to nullify its downsides. = Устанавливает Анархическое правление во всех ваших городах, альтернативный стиль правления ('Политическое здание'), заменяющий Интеграцию. Оно бесплатно и строится мгновенно, дает лишь небольшой дебафф и требует постройки Коммуны для устранения недостатков.
Anarchist Revolution! = Анархистская революция!

We've rebuilt our government in pursuit to adapt to the new era, but the current economy policy is outdated. We will need a economy reform before we can do anything else. = Мы перестроили наше правительство, чтобы адаптироваться к новой эре, но текущая экономическая политика устарела. Нам понадобится экономическая реформа, прежде чем мы сможем сделать что-то еще.
Free Market = Свободный рынок
We should believe in the unseen hand and solve all our problems with massive amount of capitals. = Мы должны верить в невидимую руку и решать все наши проблемы с помощью огромного капитала.
The unseen hand of market economy is not to be fully relied upon. We should spend effort to properly and use more refined policy to guide our nation's productivity. = Нельзя полностью полагаться на невидимую руку рыночной экономики. Мы должны приложить усилия и использовать более продуманную политику для управления производительностью нашей нации.
Stability First = Стабильность прежде всего
Our economy must serve the national unity first and formost, nothing is impossible when our nation is strong and its people united. = Наша экономика должна служить национальному единству в первую очередь, нет ничего невозможного, когда наша нация сильна, а ее народ един.
The might of our military overshadows any greed! = Мощь наших вооруженных сил затмевает любую жадность!
Nothing is beyond the power of winning in a direct conflict. We must direct all our effort into military! = Нет ничего превыше победы в прямом столкновении. Мы должны направить все наши усилия на военное дело!
Centralised Economic Planning = Централизованное планирование экономики
The market economy only benefits capitalists and speculators, our new socialist economy should maximise our development potential and distributes the goods to those who need it. = Рыночная экономика выгодна только капиталистам и спекулянтам, наша новая социалистическая экономика должна максимизировать наш потенциал развития и распределять блага тем, кто в них нуждается.
Decentralised Economy = Децентрализованная экономика
The economy suffered from monopoly and hierarchy, we should liberate the economy in favour of enabling peoples'agency to work for the masses. With nationalised industries and policies being guiding forces. = Экономика страдала от монополии и иерархии, мы должны освободить экономику, чтобы позволить людям работать на благо масс. Национализированные отрасли и политика будут направляющими силами.
Self-Management Economy = Экономика самоуправления
Worker should take the matter into their own hands instead of being some subjects of any greater entities. Mutualism and free will shall reign surpreme. = Рабочие должны взять дело в свои руки, а не быть подданными каких-либо высших инстанций. Взаимопомощь и свободная воля будут править безраздельно.
New Economic Policies = Новая экономическая политика

The previous policies may have proven to be less potent. A rearrangement is thus needed. = Возможно, предыдущая политика оказалась менее эффективной. Поэтому необходима реорганизация.
Changing economy policies = Изменение экономической политики

