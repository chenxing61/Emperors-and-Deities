 # Requires translation!
Emperors and Deities is an overhaul mod for Sid Meier's Civilization 5/Unciv. = 
 # Requires translation!
The mod's main goal is to reshape Civ 5 into a more complex and nuanced game with many new mechanics incorporated.\nMajor Differences: = 
1. Keep in mind that Luxury Resources no longer provide any [stat] by default; they provide a large amount of [stat2] and development potential. However, 'We Love the King Day' and city-state quests still require Luxury Resources. As for how you gain [stat3], you can build many buildings and create a religion with suitable beliefs. = 1. Имейте в виду, что люксовые ресурсы больше не приносят [Happiness] по умолчанию; они обеспечивают большое количество золота и потенциал для развития. Однако для квестов "Мы любим день короля" и "города-государства" по-прежнему требуются такие ресурсы. Что касается того, как вы обретете [Happiness], вы можете построить множество зданий и создать религию с подходящими верованиями.
2. Armies are now separated into four major categories:\n 'Levy Army', 'Standing Army', 'Noble Army' and 'Mercenary Army', each with different characteristics. = 2. Армии теперь разделены на четыре основные категории: "Армия призывников", "Постоянная армия", "Благородная армия" и "Армия наемников", каждая из которых имеет свои характеристики.
In other words, you cannot build a powerful army without building [buildingFilter]s like [param] to increase the unit limit. = Другими словами, вы не сможете создать мощную армию, не построив Военное здание, что-то вроде [Казарм], чтобы увеличить количество юнитов.
For a more in-depth explanation = Для более подробного объяснения
3. The tag system is used widely in this mod. A tag is a word surrounded by '', and many mechanics revolve around this system. They are also in the civilopedia of any object, so feel free to check. You don't need to remember this well to use it effectively as most tags are intuitive. = В этом моде широко используется система тегов. Тег - это слово, окруженное символом '', и многие механики основаны на этой системе. Они также есть в цивилопедии любого объекта, так что не стесняйтесь проверять. Вам не нужно хорошо это запоминать, чтобы эффективно использовать, поскольку большинство тегов интуитивно понятны.
4. [resource] is a new currency that affects the political status of your civilization, limited by [resource2]. You get it by keeping [stat] positive, choosing the right policies, and through [buildingFilter] decisions. If your [resource3] is negative, you will get a negative event that lowers stability, which provides huge debuffs. You can check the civilopedia page of [resource4] for more information. = 4. [Influence] - это новая валюта, которая влияет на политический статус вашей цивилизации и ограничена [Influence Limit]. Вы достигаете этого, поддерживая [Happiness], выбирая правильную политику и принимая решения [Enact Policies]. Если ваше [Influence] негативное, вы столкнетесь с негативным событием, которое снизит стабильность, что приведет к огромным потерям. Вы можете ознакомиться со страницей Цивилопедия [Influence] для получения дополнительной информации.
See also: Influence = Смотрите также: Влияние
See also: ED - Stability and Events = ED - Стабильность и события

ED - Starting Tips & Where to Settle = ED - Советы по началу работы и где поселиться
When starting a new game, remember to switch to Neolithic Era if you want to build your civ from the ground up. Since Unciv defaults to Ancient Era, you might lose some content there or find some progress you didn't intend to have, like government forms being different. = Начиная новую игру, не забудьте переключиться на эпоху неолита, если вы хотите создать свою цивилизацию с нуля. Поскольку Unciv по умолчанию использует Древнюю эпоху, вы можете потерять часть контента или обнаружить прогресс, которого не ожидали, например, другие формы правления.
When starting a new game in Neolithic Era or Ancient Era, you would likely have two types of units: [unit]s and [unit2]s. =  При запуске новой игры в эпоху неолита или Античности у вас, скорее всего, будет два типа юнитов: [Hunter Gatherer] и [Settler].
The major difference between Civ 5/Unciv and this mod is that your starting unit, the [unit], is not only a ranged unit but also a worker that can build [improvementName]s, [improvementName2]s, and [improvementName3]s. However, it cannot upgrade to other units. They represent humanity's earliest endeavor at building civilizations. = Основное различие между Civ 5 /Unciv и этим модом заключается в том, что ваш стартовый отряд, [Hunter Gatherer], является не только отрядом дальнего боя, но и рабочим, который может строить [Camp], [Manual Farm] и [Manual Plantation]. Однако он не может быть обновлен до других единиц. Они представляют собой самую раннюю попытку человечества построить цивилизацию.
As for [unit]s, there are no major differences, but note that settling near [tileFilter]s gives 2 extra [stat] and an extra 1 [stat2] near [tileFilter2]. These don't stack but provide a strong starting bonus for your cities. =  Что касается юнитов[Settler], то здесь нет существенных различий, но обратите внимание, что поселение возле [River] дает 2 дополнительных [Food] и 1 дополнительную [Food] возле [Lakes]. Это не суммируется, но дает хороший стартовый бонус для ваших городов.
With [buildingFilter], [unit]s also gain +1 [param] on [tileFilter] after researching [tech] technology with [promotion] promotion. Neat upgrades like this exist in many places in this mod, so you should take a proper look at each option you're given. = С помощью [Road Network] [Settler] также получают +1 к [Movement] по [Open terrain] после изучения технологии [Horse Collar] с помощью продвижения [Cart]. В этом моде есть много отличных улучшений, подобных этому, поэтому вам следует внимательно изучить каждый из предложенных вариантов.
When looking for a place to settle, luxury resources do give you a lot of [stat] and other stats but are no longer a source of [stat2]. Maintaining a balance between [stat3]-giving resources like [resource] and [resource2], [stat4] terrains like [tileFilter] and [tileFilter2], and [stat5] resources like [resource3] and [resource4] makes your new cities much more useful. It is also important that you can do [improvementName] to connect your inland cities to the sea. And [tileFilter3]-requiring buildings like [buildingFilter] no longer require settling beside [tileFilter4]s; a 2-tile distance is also good enough. = Когда вы ищете место для поселения, роскошные ресурсы действительно дают вам много [Gold] и других характеристик, но больше не являются источником [Happiness]. Поддержание баланса между [Production] ресурсами, такими как [Minerals] и [Clay], ландшафтами c [Food], такими как [Black Soil] и [Lakes], и [Food] ресурсами, такими как [Grain] и [Caprinae], делает ваши новые города намного полезнее. Также важно, чтобы вы могли заняться [Canal Construction] чтобы соединить ваши внутренние города с морем. И здания, для которых требуются [Mountain], такие как [Обсерватория], больше не требуют размещения рядом с [Mountain]; расстояния в 2 плитки также достаточно.

ED - Stability and Events = ED – Стабильность и События
The original Unciv/Civ 5 offers a flat debuff when the empire is unhappy, but Emperors and Deities turned the flat debuff into instability and negative events. Negative events often interact with variables like the number of cities or what Era you are in. To cure the debuff from them, you can check out options in [buildingFilter] or in the building tab. = В оригинальной игре Unciv/Civ 5 при недовольстве империи накладывался фиксированный дебафф, но в дополнениях Emperors and Deities этот дебафф был заменен на нестабильность и негативные события. Негативные события часто взаимодействуют с такими переменными, как количество городов или эпоха. Чтобы снять дебафф, вы можете ознакомиться с вариантами в разделе [buildingFilter] или во вкладке зданий.
[param] is an event that lowers your stability. It occurs if you are lacking [stat], [resource], or [stat2] (going negative). It also occurs more frequently in [buildingFilter] states. You will need to choose between spending some [resource2] and [stat3] to prevent it or having your stability lowered. This disables some abilities like building workers when you are in a state of [buildingFilter2]. = [Chaos Ensue] — это событие, снижающее вашу стабильность. Оно происходит, если вам не хватает [Happiness], [Influence] или [Gold] (идет к отрицательному значению). Оно также чаще происходит в состояниях [Объединения]. Вам придется выбирать между тратой [Influence] и [Gold], чтобы предотвратить это, или снижением вашей стабильности. Это отключает некоторые способности, например, строительство рабочих, когда вы находитесь в состоянии [Strife].
To keep [param] from occurring, you will need to keep your [stat] and [resource] higher than normal, which is not ideal. So it is a risk you will always face. Remember to always keep some spare [stat2] and [resource2]. = Чтобы предотвратить наступление [Chaos Ensue], вам нужно поддерживать уровень [Happiness] и [Influence] выше обычного, что нежелательно. Поэтому это риск, с которым вы всегда будете сталкиваться. Не забывайте всегда иметь при себе немного запаса [Gold] и [Influence].
[param], [param2], and [param3] are events that only occur when you are lacking [stat] from the Medieval Era onward. They may apply debuffs to all the cities you own, which can be a nightmare to deal with. = События [Wealth Gap Widens], [Rampant Corruption] и [Vagrancy Crisis] происходят только при недостатке [Happiness] начиная со Средневековья. Они могут наложить негативные эффекты на все принадлежащие вам города, что может стать настоящим кошмаром.
Luckily, you can use your capital to deal with them. Unluckily, your capitals are limited, so do what you can to prevent the lack of [stat]. = К счастью, вы можете использовать свой капитал, чтобы справиться с ними. К несчастью, ваш капитал ограничен, поэтому сделайте все возможное, чтобы предотвратить нехватку [stat].
