The structure of our civilization changes to adapt to the time. What path shall we partake? = Структура нашей цивилизации меняется, чтобы адаптироваться к времени. Какой путь мы выберем?
The most convenient way to change your government form is to let it naturally evolve. When each Era begins, you are forced to have a political shift where you must actively decide what state you want to enter: ['United'] or ['Divided']. = Самый удобный способ изменить форму правления — позволить ей развиваться естественным образом. С началом каждой Эры вы вынуждены проходить политические изменения, в ходе которых вы должны активно решать, в какое государство вы хотите войти: ['United'] или ['Divided'].
When your [Influence] is reaching over half of the [Influence Limit] without being in low stability, this enables you to unify your civilization = Когда ваше [Influence] превысит половину [Influence Limit] и при этом не будет находиться в состоянии низкой стабильности, это позволит вам объединить свою цивилизацию.
Your [Influence] will be reseted back to a certain point below [Influence Limit]. If you can successfully unify your civilization, you will have a lot of [Influence] starting off. = Ваше [Influence] будет сброшено до определенного уровня ниже [Influence Limit]. Если вы успешно объедините свою цивилизацию, у вас будет много Влияния на старте.
See also: ED - Government Forms = См. также: ED - Формы правления
No significant changes = Без существенных изменений
We are still a bunch of countries prone to infighting and invasion, but what we do have is countless oppotunities. = Мы по-прежнему представляем собой группу стран, склонных к междоусобицам и вторжениям, но у нас есть бесчисленные возможности.
Set [stockpile] to [countable] = Установите [stockpile] на [countable]
Qin has collapsed! = Цинь рухнул!
We are able to unify ourselves! = Мы можем объединиться!
The unification has been accomplished by the largest fish in the pond. We are now an unified political entity! = Объединение совершила самая крупная рыба в пруду. Теперь мы — единое политическое образование!
The empire of the past crumbles... = Империя прошлого рушится...
Our unification cannot last onto another stage of the world. Maybe its ultimately for the better, as it was stale. = Наше объединение не сможет просуществовать в другой мировой эпохе. Возможно, в конечном итоге это к лучшему, поскольку оно застоялось.
Our empire lasts onto another era! = Наша империя доживёт до другой эпохи!
Our empire survives... Maybe we can reform it continuesly unto forever. = Наша империя выживет... Возможно, мы сможем постоянно реформировать её вечно.
Shift in Politic = Сдвиг в политике

If an empire is stale in upward mobility, political reform and other essential aspect, it would fall behind, and crumble to ash. = Если империя застоялась в плане социальной мобильности, политических реформ и других важных аспектов, она отстанет и рухнет в прах.
With some reforms, our empire can adapt to new age without problems. = С некоторыми реформами наша империя сможет без проблем адаптироваться к новой эпохе.
Give up your unique civilization form and return to the generic line of unified civilization form. = Откажитесь от своей уникальной формы цивилизации и вернитесь к общей линии единой формы цивилизации.
Also, you might've ran out of unique government forms because there arent enough of them in the first place. = Кроме того, у вас, возможно, закончились уникальные формы правления, потому что их и так недостаточно.
We must prevail at preserving our root. = Мы должны преуспеть в сохранении наших корней.
Keep your current special civilization form = Сохраните свою текущую особую форму цивилизации.
Our way of life must be protected. = Наш образ жизни должен быть защищен.
There needs to be an Emperor = Нужен Император.
Focus on Centrailizing Power Structure. = Сосредоточьтесь на централизации структуры власти.
Our guiding philosophy has been painting a hopeful picture of our future, this reform will lead us closer to it. = Наша руководящая философия рисует обнадеживающую картину нашего будущего, эта реформа приблизит нас к нему.
Disperse The Power Structure. = Рассредоточьте структуру власти.
We can use our new formed policy. = Мы можем использовать нашу новую политику.
We shall dominate the Land! = Мы будем доминировать на суше!
Although our empire has stood tall, it would be more efficient if we take the new route... = Хотя наша империя и стояла стойко, было бы эффективнее выбрать новый путь.. 
We shall dominate the Ocean! = Мы будем доминировать на воде!
We will continue our empire's glory. = Мы продолжим славу нашей империи.
Maybe... having a consistent ruling family and succession law would be better. = Возможно... наличие последовательной правящей семьи и закона о престолонаследии было бы лучше.
No avaliable options = Нет доступных вариантов
Yet. = Пока что.
Reformation of the unified state = Реформирование единого государства

The peace is no more. We are suffering from effects of low stability. = Мира больше нет. Мы страдаем от последствий низкой стабильности.
Building a harmonious civilization is essential = Построение гармоничной цивилизации имеет важное значение
We can make it so that it takes more to unstablise our civilization = Мы можем сделать так, чтобы для дестабилизации нашей цивилизации потребовалось больше усилий
We must make haste before situation gets any worse = Мы должны поторопиться, прежде чем ситуация ухудшится
By investing a vast amount of social-political capital, we can stablise the situation quickly. = Вложив огромный социально-политический капитал, мы можем быстро стабилизировать ситуацию.
Ruling a country requires patience and subtlety = Управление страной требует терпения и тонкости
By carefully planning the route back to normal, we can stablise the situation slowly. = Тщательно спланировав путь к нормализации ситуации, мы можем постепенно стабилизировать ее.
Can we wait? = Можем ли мы подождать?
We need more contemplation... = Нам нужно еще подумать... 
Stablising our side of the globe = Стабилизация нашей части земного шара

We must at least do something about the things happening in the cities. = Мы должны хотя бы что-то сделать с тем, что происходит в городах.
Kill the benefactors. = Убить благодетелей.
