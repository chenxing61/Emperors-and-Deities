Decisions reguarding the civilization's internal affair. = Решения, регулирующие внутренние дела цивилизации.
Introduction = Введение
In this decision tab, different actions are unlocked based on to how many [Influence] you have and how many unique action your civilization state has provided you with. = На этой вкладке "Принятие решений" доступны различные действия в зависимости от того, cколько у Вас [Influence] и сколько уникальных действий предоставило вам состояние цивилизации.
In each era, you recieve a [Forced Shift In Politic Chance], and when you have more [Influence] than your limit in this era, you can trigger a Shift In Politic in this tab early to provide you with either a chance to unify or a chance to collapse, this grants you freedom on choices of ['Civilization State']. = В каждую эпоху вы получаете [Forced Shift In Politic Chance], и когда у вас [Influence] превышает ваш лимит в эту эпоху, вы можете заблаговременно инициировать изменение политики на этой вкладке, чтобы получить шанс либо объединиться, либо потерпеть крах, это дает вам свободу о выборе состояния цивилизации.
Most option will appear when you are unified or have more [Influence] than half of your limit. At the same time, some options only appear when your civilization are divided or have severe debuffs. This tab will help you solve them. = Большинство вариантов появятся, когда вы объединитесь или будете иметь больше [Influence], чем половину вашего лимита. В то же время, некоторые варианты появятся только тогда, когда ваша цивилизация разделена или имеет серьезные трудности. Эта вкладка поможет вам решить их.
