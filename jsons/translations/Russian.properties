ED - Government Forms = ED - Правительственные формы
(This mechanic does exist in BNW, but the author of this mod never copied that.) = (Этот механизм существует в BNW, но автор этого мода его не копировал.)
Government forms like [buildingFilter] and [buildingFilter2] are the first examples of government forms you might encounter. = Формы правления, такие как [Tribes] и [Tribal Union], — это первые примеры форм правления, с которыми вы можете столкнуться.
A government form provides army limits like [resource], [resource2]s, and unique bonuses. For [buildingFilter], it's a discount for policies. For [buildingFilter2], it's a growth bonus and a chance to evolve into [buildingFilter3] in the Ancient Era through reforms. = Форма правления устанавливает ограничения на армию, такие как [Standing Army Maintenance], [Influence Limit] и уникальные бонусы. Для [Tribes] это скидка на политику. Для [Tribal Union] это бонус к росту и шанс превратиться в [Early Empire] в Древнюю эпоху посредством реформ.
There are two types of government forms: [buildingFilter] and [buildingFilter2]. [buildingFilter3] government forms have cheaper national wonders, access to all diplomatic actions, and powerful uniques. Many historically significant empires belong to this category, like [buildingFilter4] and [buildingFilter5]. = Существует два типа форм правления: ['United'] и ['Divided']. Формы правления ['United'] имеют более дешевые национальные чудеса, доступ ко всем дипломатическим действиям и мощные уникальные способности. Многие исторически значимые империи относятся к этой категории, например, [SPQR] и [Great Qin].
On the other hand, it doesn't mean [buildingFilter] government forms are definitely weaker. They fit into their own niche by having cheaper policy costs, access to [buildingFilter2] via [buildingFilter3], and generally taking less effort to maintain. = С другой стороны, это не означает, что формы правления ['Divided'] определённо слабее. Они занимают свою нишу, имея более низкие затраты на политику, доступ к ['Agreement'] через [Enact Policies] и, как правило, требуя меньше усилий для поддержания.
You can also force a political shift by having your [resource] go above the [resource2] or reform a [buildingFilter] government form when your [resource3] is at half or above the [resource4]. = Вы также можете вызвать политический сдвиг, если ваше [Influence] превысит [Influence Limit], или реформировать форму правления ['United'], когда ваше [Influence] составляет половину или превышает [Influence Limit]
 # Requires translation!
Shift in politic = 
To keep a government form during a [param] event, you would need to keep your [resource] above 3/4 of the [resource2]. = Чтобы сохранить форму правления во время события [Shift in politic], вам необходимо поддерживать ваше [Influence] выше 3/4 от [Influence Limit].
[buildingFilter] government forms are gated behind the requirement of having enough [stat] and [resource]. You need to have your [resource2] reach half of the [resource3] and your empire being happy. = Формы правления ['United']доступны только при наличии достаточного количества [Happiness] и [Influence]. Вам необходимо, чтобы ваше [Influence] достигло половины [Influence Limit], а ваша империя была счастлива.
List of all possible government forms = Список всех возможных форм правления

ED - Reworked Army Mechanic = ED - Переработанная механика армии
Armies are now separated into four major categories:\n 'Levy Army', 'Standing Army', 'Noble Army', and 'Mercenary Army', each with different characteristics. = Армии теперь разделены на четыре основные категории: «Ополчение», «Постоянная армия», «Благородная армия» и «Наемная армия», каждая из которых имеет свои особенности.
'Levy Army' units are free and can be summoned using the [buildingFilter] function in any city with five or more population at the cost of [stat] and short-term negative effects. The [buildingFilter2] status can be reverted by disbanding your levies in peaceful times using [buildingFilter3] at the capital so they can be summoned again. = Отряды «Ополчения» бесплатны и могут быть призваны с помощью функции [Call to Arms] в любом городе с населением пять и более человек за счет [Happiness] и кратковременных негативных последствий. Статус [Call to Arms] можно отменить, распустив ополчение в мирное время с помощью функции [Enact Policies] в столице, чтобы его можно было призвать снова.
'Standing Army', 'Noble Army', and 'Mercenary Army' behave like normal units, except 'Mercenary Army' can only be bought and requires a [buildingFilter] to be built. 'Standing Army' and its elite variant 'Noble Army' are what you would rely upon most of the time; however, they do require resources like [param] and [resource] to be built. = «Постоянная армия», «Благородная армия» и «Армия наёмников» ведут себя как обычные юниты, за исключением того, что «Армию наёмников» можно только купить, и для её создания необходимо [Mercenary Office]. «Постоянная армия» и её элитный вариант «Благородная армия» — это то, на что вы будете полагаться большую часть времени; однако для их создания требуются такие ресурсы, как [Iron] и [Weapon Parts].
The main source of [resource] is government forms and [buildingFilter]s. = Основной источник [Standing Army Maintenance] — правительственные формы и ['Military Building']
The main source of [resource] is government forms and policies. = Основной источник [resource] — правительственные формы и политика.
The main source of [resource] is [buildingFilter]s and city-states. = Основной источник [Mercenary Contract] — ['Economic Building'] и города-государства.

ED - Tags = ED - Теги
There are many tags for different buildings, resources, and units. = Существует множество тегов для различных зданий, ресурсов и юнитов.
It is mostly a system for implementing strengths and weaknesses in terms of units, but for resources and buildings, it's a system that applies many buffs. = В основном это система для определения сильных и слабых сторон юнитов, но для ресурсов и зданий это система, которая применяет множество баффов.
So you need to play with tags in mind. For example, when [param] from [param2] gives you a bonus on constructing [buildingFilter], you can build more [buildingFilter2]. And later adopt [param3] from [param4] to give them [stat] production. = Поэтому вам нужно играть, учитывая теги. Например, когда [Early Mobilization] из [Militant] дает вам бонус к строительству ['Static Defense'], вы можете построить больше [Walls]. А позже принять [Knighthood] из [Feudalism], чтобы дать им производство [Culture].
This is a system that doesn't require overthinking. Normally, you just need to pay some attention to what you are doing, and the tag system will reward you accordingly. = Это система, которая не требует чрезмерного обдумывания. Обычно вам просто нужно обращать внимание на то, что вы делаете, и система тегов вознаградит вас соответствующим образом.

ED - Before Industrial Age = ED - До индустриальной эпохи
Tutorial page WIP = Страница с руководством в процессе разработки
 # Requires translation!
Before the Industrial Era, your civilization grows through agriculture, expansion, and early military organization. Food comes from Farms, Pastures, and Fishing Boats – fresh water from rivers or lakes boosts Farm yields. Population growth increases unhappiness, manageable via buildings like Baths or Arenas and religious beliefs.\n\nGovernment forms are either 'United' (powerful but costly) or 'Divided' (flexible, cheaper policies). Each new era triggers a political shift where you can reform your government.\n\nArmies are split into Levy (free via 'Call to Arms', but hurts city output), Standing (needs barracks & resources like Iron), Noble (elite, from policies), and Mercenary (bought with Gold, needs a Mercenary Office).\n\nReligion: choose Polytheism (Shrines) or Monotheism (Chapels). Faith buys religious buildings and units. Keep Influence positive to avoid instability (Struggle, Strife, Anarchy).\n\nExpansion packages (Agriculture, Infrastructure, Military, etc.) let you build multiple related buildings at once. Conquered cities require Integration buildings to remove penalties. = 

ED - The Industrial Ages = ED - Индустриальная эпоха
Arriving at the Industrial Age, there are a few distinctive new features. = При наступлении индустриальной эпохи появляются несколько новых отличительных особенностей.
[resource] and [resource2] are two new parameters you should keep in mind if you want to industrialize your civilization. = [Consumption Supply] и [Consumption Demand] — два новых параметра, которые следует учитывать, если вы хотите индустриализировать свою цивилизацию.
If [resource] outgrows [resource2] by 3 + Current Number of Cities*2, you will gain [buildingFilter], which slows down the construction of new industries but adds some positive effects. = Если [Consumption Supply] превысит [Consumption Demand] на 3 + Текущее количество городов*2, вы получите [Overproduction], которое замедлит строительство новых отраслей промышленности, но добавит некоторые положительные эффекты.
If [resource] outgrows [resource2] by 3 + Current Number of Cities*2, you will gain [buildingFilter], which speeds up the construction of new industries but adds some negative effects. = Если [Consumption Demand] превышает [Consumption Supply] на 3 + Текущее количество городов*2, вы получите [Underproduction], которое ускоряет строительство новых отраслей промышленности, но добавляет некоторые отрицательные эффекты.
[resource] is also a new resource you should keep in mind if you want to keep your industries productive. = [resource] — это также новый ресурс, который следует учитывать, если вы хотите поддерживать производительность своих предприятий.
Every industry will consume a certain amount of [resource]. If [resource2] is above [amount], they will have the full benefit of electricity in cities with [buildingFilter], like increased stats and resource production rates. = Каждое предприятие будет потреблять определенное количество [Power]. Если [Power] выше [0], они получат все преимущества электроэнергии в городах с [Power Grid], такие как увеличение характеристик и скорости производства ресурсов.
When below [amount] [resource], the city switches to [buildingFilter], consuming [amount2] [resource2]. = Когда [Industry Size] ниже [7], город переключается на [Low Industry Electricity Cost], потребляя [6] [Power].
When between [amount] to [amount2] [resource], the city switches to [buildingFilter], consuming [amount3] [resource2]. = Когда размер отрасли находится в диапазоне от [7] до [15] [Industry Size], город переключается на [Medium Industry Electricity Cost], потребляя [12] [Power].
When above [amount] [resource], the city switches to [buildingFilter], consuming [amount2] [resource2]. = Когда размер отрасли превышает [15] [Industry Size], город переходит на [High Industry Electricity Cost], потребляя [20] [Power]
