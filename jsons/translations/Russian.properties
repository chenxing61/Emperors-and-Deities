ED - Invention and Innovations = ED - Изобретения и инновации
[buildingFilter]s and [buildingFilter2]s are new buildings that represent minor technological progression and act like mini national wonders. They enable you to build certain units and buildings or give functionality boosts to existing buildings. They are built faster when other civilizations have already built them, but if you build it first, you are granted a [stat] and [stat2] boost that scales with the Era of the [buildingFilter3] or [buildingFilter4]. It is also important to state that there is no gameplay difference between [buildingFilter5]s and [buildingFilter6]s. = ['Invention'] и ['Innovation'] — это новые здания, представляющие собой незначительный технологический прогресс и действующие как мини-чудеса цивилизации. Они позволяют строить определенные юниты и здания или улучшать функциональность существующих зданий. Они строятся быстрее, если их уже построили другие цивилизации, но если вы построите их первыми, вы получите бонус в [Gold] и [Science], который зависит от эпохи ['Invention'] или ['Innovation']. Важно также отметить, что между ['Invention'] и ['Innovation'] нет никакой разницы в игровом процессе.
