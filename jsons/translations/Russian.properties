As the productivity increases. The absurdity of seeing other people as objects soon came to be realised. People are supporting the abolition. = По мере роста производительности труда абсурдность восприятия других людей как объектов вскоре стала очевидной. Люди поддерживают отмену рабства.
Slavery is evil = Рабство — зло
But we are the superior race! = Но мы — высшая раса!
Abolitionism Strikes = Аболиционизм наносит удар

We call upon our hordes. To combat the nature and our enemies. = Мы призываем наши орды. Чтобы бороться с природой и нашими врагами.
Recuit Wild Tribes into our culture = Привлекайте дикие племена в нашу культуру
