Kill the rebels. = Убить повстанцев.
Subdue the rebels. = Подчинить повстанцев.
Use our socio-economical ties to force them give up their schemes and join us. = Использовать наши социально-экономические связи, чтобы заставить их отказаться от своих планов и присоединиться к нам.
Let them fight our enemies. Let them become 'heros'. = Пусть они сражаются с нашими врагами. Пусть они станут героями.
Remove the Slums immediately! = Немедленно снесите трущобы!
Force the Slume dwelllers out of their residence... Might be a bad move. = Выселите жителей трущоб из их жилищ... Возможно, это плохой шаг.
Compromise with the upper classes. = Идите на компромисс с высшими классами.
By dealing with the wealth gap directly, we can provide more residential land in the cities, or at least provide better houses. = Решив проблему неравенства в доходах напрямую, мы можем обеспечить больше жилых земель в городах или, по крайней мере, построить дома получше.
If they yearn for place to live, why not go out? = Если они жаждут жилья, почему бы им не уехать?
Crisis Solver = Решатель кризисов

Our civilization consists of multiple countries. If they do not reach agreement in some way. We are at the danger of being foods on a plate. = Наша цивилизация состоит из множества стран. Если они не достигнут соглашения каким-либо образом, мы рискуем стать едой на тарелке.
