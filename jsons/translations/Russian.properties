(Short Victory) Nuclear Monopoly = (Короткая победа) \nЯдерная монополия
Complete [Nuclear Monopoly]\nto win! = Завершите [Nuclear Monopoly], \nчтобы победить!
You have achieved victory through monopoly of Nuclear Power! Thus gaining the power to destroy your opponents and rule the world. = Вы одержали победу, получив монополию на ядерную энергетику! Таким образом, вы обрели власть над своими противниками и стали править миром.
Remember to either surpass your opponent in [Science], or just destory them all together. = Помните: либо превзойдите противника в науке, либо просто уничтожьте его!

(Short Victory) Industrial = (Короткая победа) \nИндустриализация
(Short Term Victory) Build 6 [Civilian Factory Complex] and then [Industrial Revolution]\nto win! = (Краткосрочная победа) Постройте 6 [Civilian Factory Complex], а затем [Industrial Revolution], чтобы победить!
You have achieved victory through industrialising the fastest in the world, defining the industrial age as others cant compete = Вы одержали победу, проведя самую быструю в мире индустриализацию, определив индустриальную эпоху, с которой другие не могут конкурировать

Complete all the spaceship parts\nto win! = Соберите все части космического корабля, чтобы победить!
Remember to either surpass your opponent in science, or just destory them all together. = Помните, что нужно либо превзойти противника в науке, либо просто уничтожить его всех вместе.

Complete 8 Policy branches and consolidate your ideology \nto win! = Завершите 8 ветвей институтов и укрепите свою идеологию, \nчтобы победить!
You have proven your civlization is the most adapt leader of the world. As your ways of govern are the most superior = Вы доказали, что ваша цивилизация - самый адаптирующийся лидер мира. Ваши методы правления превосходят всех.
Remember to either surpass your opponent in culture, or just destory them all together. = Помните: либо превзойдите противника в культуре, либо просто уничтожьте его!

Build the UN and be voted\nworld leader to win! = Создайте ООН и станьте мировым лидером, победив на выборах!
Remember to either surpass your opponent in city-state ownership, or just destory them all together. = Помните: либо превзойдите противника во влиянии на города-государства, либо просто уничтожьте его!

Destroy all enemies\nto win! = Уничтожьте всех врагов, \nчтобы победить!
Defend or take the initiative, dont put all your resources toward development. = Обороняйтесь или перехватывайте инициативу, не вкладывайте все ресурсы только в развитие.

Become the world religion = Станьте мировой религией
We have converted all the people in the world to the same belief, the true way shall guide the humanity forward! = Мы обратили всех людей в мире в единую веру, истинный путь поведет человечество вперед!
Remember, it is important to not let those pesky missionary take your people's heart! Next time. = Помните, важно не позволять этим надоедливым миссионерам завладеть сердцами ваших людей! В следующий раз.

The survival of the fittest. And it isn't you. = Выживает сильнейший. И это не вы.

