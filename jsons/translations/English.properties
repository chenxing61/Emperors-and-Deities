ED - Mod Manual = 
 # Requires translation!
Emperors and Deities is an overhaul mod for Sid Meier's Civilization 5/Unciv. = 
 # Requires translation!
The mod's main goal is to reshape Civ 5 into a more complex and nuanced game with many new mechanics incorporated.\nMajor Differences: = 
 # Requires translation!
1. Keep in mind that Luxury Resources no longer provide any [stat] by default; they provide a large amount of [stat2] and development potential. However, 'We Love the King Day' and city-state quests still require Luxury Resources. As for how you gain [stat3], you can build many buildings and create a religion with suitable beliefs. = 
 # Requires translation!
2. Armies are now separated into four major categories:\n 'Levy Army', 'Standing Army', 'Noble Army' and 'Mercenary Army', each with different characteristics. = 
 # Requires translation!
Barracks = 
 # Requires translation!
In other words, you cannot build a powerful army without building [buildingFilter]s like [param] to increase the unit limit. = 
 # Requires translation!
For a more in-depth explanation = 
 # Requires translation!
3. The tag system is used widely in this mod. A tag is a word surrounded by '', and many mechanics revolve around this system. They are also in the civilopedia of any object, so feel free to check. You don't need to remember this well to use it effectively as most tags are intuitive. = 
 # Requires translation!
4. [resource] is a new currency that affects the political status of your civilization, limited by [resource2]. You get it by keeping [stat] positive, choosing the right policies, and through [buildingFilter] decisions. If your [resource3] is negative, you will get a negative event that lowers stability, which provides huge debuffs. You can check the civilopedia page of [resource4] for more information. = 
 # Requires translation!
See also: Influence = 
 # Requires translation!
See also: ED - Stability and Events = 

 # Requires translation!
ED - Starting Tips & Where to Settle = 
 # Requires translation!
When starting a new game, remember to switch to Neolithic Era if you want to build your civ from the ground up. Since Unciv defaults to Ancient Era, you might lose some content there or find some progress you didn't intend to have, like government forms being different. = 
 # Requires translation!
When starting a new game in Neolithic Era or Ancient Era, you would likely have two types of units: [unit]s and [unit2]s. = 
 # Requires translation!
The major difference between Civ 5/Unciv and this mod is that your starting unit, the [unit], is not only a ranged unit but also a worker that can build [improvementName]s, [improvementName2]s, and [improvementName3]s. However, it cannot upgrade to other units. They represent humanity's earliest endeavor at building civilizations. = 
 # Requires translation!
As for [unit]s, there are no major differences, but note that settling near [tileFilter]s gives 2 extra [stat] and an extra 1 [stat2] near [tileFilter2]. These don't stack but provide a strong starting bonus for your cities. = 
 # Requires translation!
Movement = 
 # Requires translation!
With [buildingFilter], [unit]s also gain +1 [param] on [tileFilter] after researching [tech] technology with [promotion] promotion. Neat upgrades like this exist in many places in this mod, so you should take a proper look at each option you're given. = 
 # Requires translation!
When looking for a place to settle, luxury resources do give you a lot of [stat] and other stats but are no longer a source of [stat2]. Maintaining a balance between [stat3]-giving resources like [resource] and [resource2], [stat4] terrains like [tileFilter] and [tileFilter2], and [stat5] resources like [resource3] and [resource4] makes your new cities much more useful. It is also important that you can do [improvementName] to connect your inland cities to the sea. And [tileFilter3]-requiring buildings like [buildingFilter] no longer require settling beside [tileFilter4]s; a 2-tile distance is also good enough. = 

 # Requires translation!
ED - Stability and Events = 
 # Requires translation!
The original Unciv/Civ 5 offers a flat debuff when the empire is unhappy, but Emperors and Deities turned the flat debuff into instability and negative events. Negative events often interact with variables like the number of cities or what Era you are in. To cure the debuff from them, you can check out options in [buildingFilter] or in the building tab. = 
 # Requires translation!
[param] is an event that lowers your stability. It occurs if you are lacking [stat] (going negative). It also occurs more frequently in [buildingFilter] states. You will need to choose between spending some [resource] and [stat2] to prevent it or having your stability lowered. This disables some abilities like building workers when you are in a state of [buildingFilter2]. = 
 # Requires translation!
To keep [param] from occurring, you will need to keep your [stat] and [resource] higher than normal, which is not ideal. So it is a risk you will always face. Remember to always keep some spare [stat2] and [resource2]. = 
 # Requires translation!
[param], [param2], and [param3] are events that only occur when you are lacking [stat]. They may apply debuffs to all the cities you own, which can be a nightmare to deal with. = 
 # Requires translation!
Luckily, you can use your capital to deal with them. Unluckily, your capitals are limited, so do what you can to prevent the lack of [stat]. = 
 # Requires translation!
The Events Listed Above are only examples of what could be possible. But remember, when a event occur, as long as you have enough [resource] and [stat] as safety net, you will endure. And there are even sometimes benefits from the negative events. = 
