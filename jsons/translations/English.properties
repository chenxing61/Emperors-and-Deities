 # Requires translation!
(This mechanic does exist in BNW, but the author of this mod never copied that.) = 
 # Requires translation!
Government forms like [buildingFilter] and [buildingFilter2] are the first examples of government forms you might encounter. = 
 # Requires translation!
A government form provides army limits like [resource], [resource2]s, and unique bonuses. For [buildingFilter], it's a discount for policies. For [buildingFilter2], it's a growth bonus and a chance to evolve into [buildingFilter3] in the Ancient Era through reforms. = 
 # Requires translation!
There are two types of government forms: [buildingFilter] and [buildingFilter2]. [buildingFilter3] government forms have cheaper National Wonders, access to all diplomatic actions, and powerful uniques. Many historically significant empires belong to this category, like [buildingFilter4] and [buildingFilter5]. = 
 # Requires translation!
On the other hand, it doesn't mean [buildingFilter] government forms are definitely weaker. They fit into their own niche by having cheaper policy costs, access to [buildingFilter2] via [buildingFilter3], and generally taking less effort to maintain. = 
 # Requires translation!
You can also force a political shift by having your [resource] go above the [resource2] or reform a [buildingFilter] government form when your [resource3] is at half or above the [resource4]. = 
 # Requires translation!
Shift in politic = 
 # Requires translation!
To keep a government form during a [param] event, you would need to keep your [resource] above 3/4 of the [resource2]. = 
 # Requires translation!
[buildingFilter] government forms are gated behind the requirement of having enough [stat] and [resource]. You need to have your [resource2] reach half of the [resource3] and your empire being happy. = 
