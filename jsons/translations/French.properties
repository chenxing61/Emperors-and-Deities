ED - Religion Changes = 
 # Requires translation!
faith = 
 # Requires translation!
At first, religion premise is decided by the three-way choice betwee [param], [param2] and [param3]. Although the one standing out is [param4].\nBecause the other two, [param5] seek to maintain a alliance between [stat] and [stat2], [param6] is ambiguous toward [param7], but [param8] is the way to go if you want to delve into religion faster than anyone else. They also have a different selection of wonder to build. Avoiding a fair amount of competition. = 
 # Requires translation!
Then, you have pantheon, which gives plenty of faith according to the terrain. Even [param] would have to choose a pantheon as it is a spritual step toward the lord. = 
 # Requires translation!
Beliefs unlocks plenty of things, aside from buildings like [buildingFilter] and [buildingFilter2], some also unlocks wonders. They also helps with decreasing the unhappiness from the population. Some of them need specific policies like [param] to be adopted.\n Follower Beliefs are ability granters. They enable crucial abilities such as using [stat] to buy stuff.\n Enhancer Beliefs on the other hand, boosts the religion to spread itself better and gives even more bonuses toward various aspects like military and further utilises [stat2]. = 

 # Requires translation!
