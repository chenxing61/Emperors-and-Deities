ED - Expansions, Consolidation and Modernization = 
 # Requires translation!
City development is organized into three tiers of building packages: "Expansion", "Consolidation", and "Modernization". = 
 # Requires translation!
How packages work: Each package lets you build multiple related buildings at once, saving [stat] and ensuring that development becomes easier with tech investment. Packages become available as you progress through eras. For example, [buildingFilter] builds [buildingFilter2], [buildingFilter3], and [buildingFilter4] together and is unlocked by [tech]. = 
 # Requires translation!
"Expansion": \nCovers basic buildings which form the foundation of any town. Which are mostly unlocked before [buildingFilter] = 
 # Requires translation!
"Consolidation" \nCovers buildings that forms a proper city and make it useful. Which are mostly unlocked starting from [buildingFilter] and before [buildingFilter2]. = 
 # Requires translation!
"Modernization" \nCovers buildings that makes a city that is considered modernized. Which are mostly unlocked starting from [buildingFilter]. You wouldn't live without them in real life. = 

