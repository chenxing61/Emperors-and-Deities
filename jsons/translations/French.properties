 # Requires translation!
Great Persons have been changed. For example, [param] has been separated into [unit] and [unit2]. [unit3]s and [unit4]s have new unique mechanics like creating [resource]s and [resource2]s. Some [improvementFilter]s like [improvementName], [improvementName2]s, and [improvementName3]s have bonuses on specific tiles. = 
