ED - The Industrial Ages = 
 # Requires translation!
Arriving at the Industrial Age, there are a few distinctive new features. = 
 # Requires translation!
[resource] and [resource2] are two new parameters you should keep in mind if you want to industrialize your civilization. = 
 # Requires translation!
If [resource] outgrows [resource2] by 3 + Current Number of Cities*2, you will gain [buildingFilter], which slows down the construction of new industries but adds some positive effects. = 
 # Requires translation!
If [resource] outgrows [resource2] by 3 + Current Number of Cities*2, you will gain [buildingFilter], which speeds up the construction of new industries but adds some negative effects. = 
 # Requires translation!
[resource] is also a new resource you should keep in mind if you want to keep your industries productive. = 
 # Requires translation!
Every industry will consume a certain amount of [resource]. If [resource2] is above [amount], they will have the full benefit of electricity in cities with [buildingFilter], like increased stats and resource production rates. = 
 # Requires translation!
When below [amount] [resource], the city switches to [buildingFilter], consuming [amount2] [resource2]. = 
 # Requires translation!
When between [amount] to [amount2] [resource], the city switches to [buildingFilter], consuming [amount3] [resource2]. = 
 # Requires translation!
When above [amount] [resource], the city switches to [buildingFilter], consuming [amount2] [resource2]. = 
