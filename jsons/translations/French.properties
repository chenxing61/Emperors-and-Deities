ED - Invention and Innovations = 
 # Requires translation!
[buildingFilter]s and [buildingFilter2]s are new buildings that represent minor technological progression and act like mini National Wonders. They enable you to build certain units and buildings or give functionality boosts to existing buildings. They are built faster when other civilizations have already built them, but if you build it first, you are granted a [stat] and [stat2] boost that scales with the Era of the [buildingFilter3] or [buildingFilter4]. It is also important to state that there is no gameplay difference between [buildingFilter5]s and [buildingFilter6]s. = 
