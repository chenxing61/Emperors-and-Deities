ED - Reworked Army Mechanic = 
 # Requires translation!
Armies are now separated into four major categories:\n 'Levy Army', 'Standing Army', 'Noble Army', and 'Mercenary Army', each with different characteristics. = 
 # Requires translation!
'Levy Army' units are free and can be summoned using the [buildingFilter] function in any city with five or more population at the cost of [stat] and short-term negative effects. The [buildingFilter2] status can be reverted by disbanding your levies in peaceful times using [buildingFilter3] at the capital so they can be summoned again. = 
 # Requires translation!
'Standing Army', 'Noble Army', and 'Mercenary Army' behave like normal units, except 'Mercenary Army' can only be bought and requires a [buildingFilter] to be built. 'Standing Army' and its elite variant 'Noble Army' are what you would rely upon most of the time; however, they do require resources like [param] and [resource] to be built. = 
 # Requires translation!
The main source of [resource] is government forms and [buildingFilter]s. = 
 # Requires translation!
The main source of [resource] is government forms and policies. = 
 # Requires translation!
The main source of [resource] is [buildingFilter]s and city-states. = 

 # Requires translation!
ED - Tags = 
 # Requires translation!
There are many tags for different buildings, resources, and units. = 
 # Requires translation!
It is mostly a system for implementing strengths and weaknesses in terms of units, but for resources and buildings, it's a system that applies many buffs. = 
 # Requires translation!
So you need to play with tags in mind. For example, when [param] from [param2] gives you a bonus on constructing [buildingFilter], you can build more [buildingFilter2]. And later adopt [param3] from [param4] to give them [stat] production. = 
 # Requires translation!
This is a system that doesn't require overthinking. Normally, you just need to pay some attention to what you are doing, and the tag system will reward you accordingly. = 
